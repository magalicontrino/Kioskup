# Découvre la structure de la base Airtable et l'écrit dans airtable-schema.json.
#
# Étape de reconnaissance : elle sert à connaître l'ID de la base et les noms de
# colonnes avant d'écrire la génération des fiches. Elle ne lit que le schéma —
# jamais le contenu des entrées, qui comporte des données personnelles.
name: Découverte du schéma Airtable

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/airtable-schema.yml
      - .github/scripts/schema_airtable.py

permissions:
  contents: write

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Interroger Airtable
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request

          token = os.environ.get("AIRTABLE_TOKEN")
          if not token:
              raise SystemExit("Secret AIRTABLE_TOKEN absent du dépôt.")

          def get(url):
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.load(r)

          bases = get("https://api.airtable.com/v0/meta/bases").get("bases", [])
          print(f"{len(bases)} base(s) accessible(s)")

          sortie = {"bases": []}
          for b in bases:
              schema = get(f"https://api.airtable.com/v0/meta/bases/{b['id']}/tables")
              tables = []
              for t in schema.get("tables", []):
                  champs = [
                      {
                          "nom": f["name"],
                          "type": f["type"],
                          # Les options ne sont reprises que pour les listes de choix :
                          # ce sont elles qui révèlent la colonne de validation.
                          "choix": [c["name"] for c in f.get("options", {}).get("choices", [])]
                          or None,
                      }
                      for f in t.get("fields", [])
                  ]
                  tables.append({"table": t["name"], "id": t["id"], "champs": champs})
                  print(f"\n=== {b['name']} / {t['name']} ({t['id']}) ===")
                  for c in champs:
                      extra = f"  choix={c['choix']}" if c["choix"] else ""
                      print(f"  - {c['nom']}  [{c['type']}]{extra}")
              sortie["bases"].append({"nom": b["name"], "id": b["id"], "tables": tables})

          with open("airtable-schema.json", "w", encoding="utf-8") as f:
              json.dump(sortie, f, ensure_ascii=False, indent=2)
          PY

      - name: Committer le schéma
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add airtable-schema.json
          git diff --staged --quiet || git commit -m "Relever la structure de la base Airtable"
          git push
