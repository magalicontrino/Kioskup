# Compare la base Airtable aux fiches artistes publiées, sans rien modifier.
#
# Étape de contrôle avant d'automatiser la génération : elle dit ce qui
# apparaîtrait, ce qui disparaîtrait, et ce qui cloche dans les données.
#
# Le dépôt est public : le rapport ne contient que des informations déjà
# publiées (noms d'artistes). Les statuts ne sont donnés qu'en totaux — publier
# « untel : Refusé » serait indélicat — et jamais les e-mails, fiches
# techniques ou commentaires internes.
name: Audit Airtable / site

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/airtable-audit.yml
      - .github/scripts/audit_airtable.py

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Comparer
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python3 .github/scripts/audit_airtable.py

      - name: Committer le rapport
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rapport-artistes.md || true
          git diff --staged --quiet || git commit -m "Auditer la correspondance Airtable / fiches publiées"
          git push || true
